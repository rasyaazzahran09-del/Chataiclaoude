name: Build Godot APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: "URL download ZIP project Godot"
        required: true
      tag:
        description: "Tag build"
        required: true
      build_type:
        description: "debug / release"
        required: true
        default: "release"
      godot_version:
        description: "Versi Godot (contoh: 4.3, 4.2.2, 3.6)"
        required: false
        default: "4.3"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      GODOT_VERSION: ${{ github.event.inputs.godot_version || '4.3' }}

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            unzip wget python3 python3-pip \
            libxcursor1 libxinerama1 libxrandr2 libxi6 \
            libgl1-mesa-dev libglu1-mesa-dev

      - name: Download ZIP project
        run: |
          ZIP_URL="${{ github.event.inputs.zip_url }}"
          if echo "$ZIP_URL" | grep -q "api.github.com/repos"; then
            curl -L -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
              -H "Accept: application/vnd.github.raw" \
              "$ZIP_URL" -o project.zip -w "\nHTTP: %{http_code}\n"
          else
            curl -L -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
              -H "Accept: application/octet-stream" \
              "$ZIP_URL" -o project.zip -w "\nHTTP: %{http_code}\n"
          fi
          ls -lh project.zip

      - name: Extract ZIP
        run: |
          if ! unzip -t project.zip > /dev/null 2>&1; then
            echo "❌ ZIP tidak valid!"; cat project.zip; exit 1
          fi
          unzip -q project.zip -d project_raw
          SUB=$(find project_raw -maxdepth 1 -mindepth 1 -type d | wc -l)
          FILES=$(find project_raw -maxdepth 1 -mindepth 1 -type f | wc -l)
          if [ "$SUB" -eq 1 ] && [ "$FILES" -eq 0 ]; then
            PROJECT_DIR=$(find project_raw -maxdepth 1 -mindepth 1 -type d | head -n 1)
          else
            PROJECT_DIR="project_raw"
          fi
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          echo "✅ Project: $PROJECT_DIR"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android Build Tools
        run: |
          yes | sdkmanager "build-tools;34.0.0" "platforms;android-34" "ndk;25.1.8937393" || true

      - name: Download & Setup Godot
        run: |
          GODOT_MAJOR=$(echo "$GODOT_VERSION" | cut -d'.' -f1)
          GODOT_BASE_URL="https://github.com/godotengine/godot/releases/download"

          if [ "$GODOT_MAJOR" = "4" ]; then
            GODOT_BIN="Godot_v${GODOT_VERSION}-stable_linux.x86_64"
            TEMPLATES_NAME="Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
            GODOT_URL="${GODOT_BASE_URL}/${GODOT_VERSION}-stable/${GODOT_BIN}.zip"
            TEMPLATES_URL="${GODOT_BASE_URL}/${GODOT_VERSION}-stable/${TEMPLATES_NAME}"
          else
            GODOT_BIN="Godot_v${GODOT_VERSION}-stable_linux_headless.64"
            TEMPLATES_NAME="Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
            GODOT_URL="${GODOT_BASE_URL}/${GODOT_VERSION}-stable/${GODOT_BIN}.zip"
            TEMPLATES_URL="${GODOT_BASE_URL}/${GODOT_VERSION}-stable/${TEMPLATES_NAME}"
          fi

          echo "→ Download Godot $GODOT_VERSION"
          wget -q "$GODOT_URL" -O godot.zip
          unzip -q godot.zip
          chmod +x "$GODOT_BIN"
          sudo mv "$GODOT_BIN" /usr/local/bin/godot
          echo "✅ Godot: $(godot --version)"

          echo "→ Download export templates"
          wget -q "$TEMPLATES_URL" -O templates.tpz

          TEMPLATES_DIR="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          mkdir -p "$TEMPLATES_DIR"
          unzip -q templates.tpz -d /tmp/godot_templates
          cp -r /tmp/godot_templates/templates/* "$TEMPLATES_DIR/" || \
            cp -r /tmp/godot_templates/* "$TEMPLATES_DIR/"
          echo "✅ Templates installed"

      - name: Setup Godot Android Export Preset
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          # Buat export_presets.cfg jika tidak ada
          if [ ! -f "export_presets.cfg" ]; then
            cat > export_presets.cfg << 'EOF'
          [preset.0]
          name="Android"
          platform="Android"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="output/app.apk"
          script_export_mode=1

          [preset.0.options]
          custom_template/debug=""
          custom_template/release=""
          gradle_build/use_gradle_build=false
          gradle_build/gradle_build_directory=""
          gradle_build/compress_native_libraries=false
          architectures/armeabi-v7a=true
          architectures/arm64-v8a=true
          architectures/x86=false
          architectures/x86_64=false
          keystore/debug=""
          keystore/debug_user=""
          keystore/debug_password=""
          keystore/release=""
          keystore/release_user=""
          keystore/release_password=""
          package/unique_name="com.bot.godot.app"
          package/name="GodotApp"
          package/signed=false
          package/classify_as_game=false
          package/retain_data_on_uninstall=false
          package/exclude_from_recents=false
          package/enabled_permissions=[]
          package/target_sdk=""
          package/min_sdk=""
          launcher_icons/main_192x192=""
          launcher_icons/adaptive_foreground_432x432=""
          launcher_icons/adaptive_background_432x432=""
          graphics/opengl_debug=false
          EOF
            echo "✅ export_presets.cfg dibuat"
          else
            echo "✅ export_presets.cfg sudah ada"
          fi
          mkdir -p output

      - name: Build Godot APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          mkdir -p output
          BUILD_MODE="${{ github.event.inputs.build_type }}"

          godot --headless --export-$BUILD_MODE "Android" output/app.apk 2>&1 || \
          godot --export-$BUILD_MODE "Android" output/app.apk 2>&1 || true

          # Cari APK hasil build
          APK=$(find . -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "❌ APK Godot tidak ditemukan!"
            ls -la output/ || true
            exit 1
          fi
          echo "✅ APK: $APK"
          ls -lh "$APK"

      - name: Find & Upload APK
        run: |
          APK_FOUND=$(find $GITHUB_WORKSPACE -name "*.apk" | head -n 1)
          if [ -z "$APK_FOUND" ]; then echo "❌ APK tidak ditemukan!"; exit 1; fi
          ls -lh "$APK_FOUND"
          APK_REL=$(echo "$APK_FOUND" | sed "s|$GITHUB_WORKSPACE/||")
          echo "APK_PATH=$APK_REL" >> $GITHUB_ENV
          echo "PROJECT_DIR=$GITHUB_WORKSPACE" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: godot-${{ github.event.inputs.build_type }}-${{ github.event.inputs.tag }}
          path: ${{ env.PROJECT_DIR }}/${{ env.APK_PATH }}
          retention-days: 1
          if-no-files-found: error
