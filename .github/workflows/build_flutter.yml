name: Build Flutter APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL download ZIP project Flutter'
        required: true
        type: string
      tag:
        description: 'Tag build (run_id_ref)'
        required: false
        type: string
      build_type:
        description: 'debug / release'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug
      only_analyze:
        description: 'Hanya jalankan analyze (true/false)'
        required: false
        default: 'false'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: stable
          cache: true

      - name: Setup Android SDK
        run: |
          ANDROID_SDK="/usr/local/lib/android/sdk"
          echo "ANDROID_HOME=$ANDROID_SDK" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK" >> $GITHUB_ENV
          echo "$ANDROID_SDK/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK/platform-tools" >> $GITHUB_PATH

      - name: Accept Android licenses
        run: |
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" 2>/dev/null || true

      - name: Download ZIP project
        run: |
          echo "=== Downloading ZIP ==="
          echo "URL: ${{ github.event.inputs.zip_url }}"
          for i in 1 2 3; do
            curl -fL --retry 3 --retry-delay 10 --max-time 600 \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/octet-stream" \
              -o project.zip "${{ github.event.inputs.zip_url }}" && break
            echo "Attempt $i gagal, retry in 15s..."
            sleep 15
          done
          if [ ! -f project.zip ] || [ ! -s project.zip ]; then
            echo "ERROR: ZIP download gagal atau file kosong"
            exit 1
          fi
          echo "=== File Info ==="
          ls -lh project.zip
          echo "=== File Type ==="
          file project.zip
          echo "=== First Bytes ==="
          xxd project.zip | head -2

      - name: Extract ZIP
        run: |
          echo "=== Validating ZIP ==="
          if ! unzip -t project.zip > /dev/null 2>&1; then
            echo "ERROR: File bukan ZIP valid!"
            cat project.zip | head -5
            exit 1
          fi
          echo "ZIP valid"
          mkdir -p flutter_project
          unzip -q project.zip -d flutter_project_tmp
          INNER_COUNT=$(ls flutter_project_tmp | wc -l)
          INNER=$(ls flutter_project_tmp | head -1)
          if [ "$INNER_COUNT" -eq 1 ] && [ -d "flutter_project_tmp/$INNER" ]; then
            mv "flutter_project_tmp/$INNER"/* flutter_project/ 2>/dev/null || true
            mv "flutter_project_tmp/$INNER"/.[!.]* flutter_project/ 2>/dev/null || true
          else
            mv flutter_project_tmp/* flutter_project/ 2>/dev/null || true
          fi
          rm -rf flutter_project_tmp project.zip
          ls flutter_project/
          echo "PROJECT_DIR=flutter_project" >> $GITHUB_ENV

      - name: Analyze Project Code
        working-directory: flutter_project
        run: |
          if [ -f "pubspec.yaml" ]; then
            flutter analyze --no-fatal-infos --no-fatal-warnings 2>&1 || true
          else
            echo "pubspec.yaml tidak ditemukan"
          fi

      - name: Stop if Analyze Only
        if: ${{ github.event.inputs.only_analyze == 'true' }}
        run: exit 1

      - name: Disable minify and shrink resources
        run: |
          GRADLE="flutter_project/android/app/build.gradle"
          if [ -f "$GRADLE" ]; then
            sed -i 's/minifyEnabled true/minifyEnabled false/g' "$GRADLE"
            sed -i 's/shrinkResources true/shrinkResources false/g' "$GRADLE"
          fi

      - name: Fix signing config
        run: |
          GRADLE="flutter_project/android/app/build.gradle"
          BUILD_MODE="${{ github.event.inputs.build_type }}"
          RELEASE_JKS="flutter_project/android/app/release.jks"
          keytool -genkeypair -v \
            -keystore "$RELEASE_JKS" \
            -alias release \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=FlutterBot,O=FlutterBot,C=ID" 2>/dev/null || true
          if grep -q "signingConfigs" "$GRADLE" 2>/dev/null; then
            sed -i 's|storeFile file("[^"]*")|storeFile file("release.jks")|g' "$GRADLE"
            sed -i 's|storePassword "[^"]*"|storePassword "android"|g' "$GRADLE"
            sed -i 's|keyAlias "[^"]*"|keyAlias "release"|g' "$GRADLE"
            sed -i 's|keyPassword "[^"]*"|keyPassword "android"|g' "$GRADLE"
          elif [ "$BUILD_MODE" = "release" ]; then
            python3 - << 'PYEOF'
import re, sys
try:
    with open('flutter_project/android/app/build.gradle', 'r') as f:
        content = f.read()
    if 'signingConfigs' in content:
        sys.exit(0)
    signing_block = """
    signingConfigs {
        release {
            storeFile file("release.jks")
            storePassword "android"
            keyAlias "release"
            keyPassword "android"
        }
    }
"""
    content = content.replace('    buildTypes {', signing_block + '    buildTypes {', 1)
    def inject_signing(m):
        inner = m.group(0)
        if 'signingConfig' not in inner:
            inner = inner.rstrip('}').rstrip() + '\n            signingConfig signingConfigs.release\n        }\n'
        return inner
    content = re.sub(r'release \{[^}]*\}', inject_signing, content, count=1)
    with open('flutter_project/android/app/build.gradle', 'w') as f:
        f.write(content)
    print("signingConfigs injected")
except Exception as e:
    print(f"Warning: {e}")
PYEOF
          fi

      - name: Write proguard-rules.pro
        run: |
          PROGUARD="flutter_project/android/app/proguard-rules.pro"
          cat > "$PROGUARD" << 'EOF'
-keep class io.flutter.** { *; }
-keep class io.flutter.plugins.** { *; }
-keep class io.flutter.embedding.** { *; }
-dontwarn io.flutter.**
-keep class ** { *; }
-dontwarn **
EOF

      - name: Patch Gradle wrapper version
        run: |
          WRAPPER="flutter_project/android/gradle/wrapper/gradle-wrapper.properties"
          if [ -f "$WRAPPER" ]; then
            sed -i 's|distributionUrl=.*|distributionUrl=https\://services.gradle.org/distributions/gradle-8.10.2-bin.zip|' "$WRAPPER"
            echo "Patched to Gradle 8.10.2"
            cat "$WRAPPER"
          fi

      - name: Write local.properties
        run: |
          FLUTTER_SDK=$(which flutter | sed 's|/bin/flutter||')
          echo "sdk.dir=$ANDROID_HOME" > flutter_project/android/local.properties
          echo "flutter.sdk=$FLUTTER_SDK" >> flutter_project/android/local.properties
          echo "flutter.buildMode=${{ github.event.inputs.build_type }}" >> flutter_project/android/local.properties

      - name: Write gradle.properties
        run: |
          GP="flutter_project/android/gradle.properties"
          touch "$GP"
          grep -q "org.gradle.jvmargs" "$GP" || echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m" >> "$GP"
          grep -q "android.useAndroidX" "$GP" || echo "android.useAndroidX=true" >> "$GP"
          grep -q "android.enableJetifier" "$GP" || echo "android.enableJetifier=true" >> "$GP"
          grep -q "org.gradle.parallel" "$GP" || echo "org.gradle.parallel=true" >> "$GP"
          grep -q "org.gradle.caching" "$GP" || echo "org.gradle.caching=true" >> "$GP"
          grep -q "android.enableR8.fullMode" "$GP" || echo "android.enableR8.fullMode=false" >> "$GP"

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ hashFiles('flutter_project/pubspec.lock') }}
          restore-keys: pub-

      - name: Flutter pub get
        working-directory: flutter_project
        run: flutter pub get

      - name: Build APK
        working-directory: flutter_project
        timeout-minutes: 40
        run: |
          set -o pipefail
          BUILD_MODE="${{ github.event.inputs.build_type }}"
          echo "=== BUILD START: $BUILD_MODE ==="
          if [ "$BUILD_MODE" = "release" ]; then
            flutter build apk --release --no-tree-shake-icons --verbose 2>&1 | tee /tmp/flutter_build.log
          else
            flutter build apk --debug --no-tree-shake-icons --verbose 2>&1 | tee /tmp/flutter_build.log
          fi
          BUILD_EXIT=$?
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "=== BUILD GAGAL — error log ==="
            grep -E "(Error|error|Exception|FAILED|lib/)" /tmp/flutter_build.log | tail -50 || true
            echo "=== 50 baris terakhir ==="
            tail -50 /tmp/flutter_build.log
            exit 1
          fi

      - name: Locate and rename APK
        run: |
          APK=$(find flutter_project/build/app/outputs -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: APK tidak ditemukan"
            find flutter_project/build -type f 2>/dev/null | head -20
            exit 1
          fi
          mkdir -p artifacts
          cp "$APK" artifacts/flutter-${{ github.event.inputs.build_type }}.apk
          echo "APK: $(du -sh artifacts/*.apk)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-${{ github.event.inputs.build_type }}-${{ github.event.inputs.tag }}
          path: artifacts/flutter-${{ github.event.inputs.build_type }}.apk
          retention-days: 3
          if-no-files-found: error

