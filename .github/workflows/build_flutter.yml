name: Flutter APK Builder

on:
  workflow_dispatch:
    inputs:
      zip_download_url:
        description: 'URL download file ZIP Flutter project'
        required: true
        type: string
      build_mode:
        description: 'Build mode (release atau debug)'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug
      run_id_ref:
        description: 'Referensi unik untuk tracking'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # FIX: Hapus cache: gradle — menyebabkan crash di repo yang belum ada Gradle
      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # FIX: Pastikan JAVA_HOME ter-set dengan benar
      - name: Verify Java installation
        run: |
          java -version
          echo "JAVA_HOME=$JAVA_HOME"
          which java

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true
          cache-key: flutter-3.24.5-stable

      - name: Verify Flutter installation
        run: flutter --version

      # FIX: Ganti android-actions/setup-android (sering error) dengan setup manual
      - name: Setup Android SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          if [ -z "$ANDROID_HOME" ] && [ -d "$HOME/android-sdk" ]; then
            export ANDROID_HOME="$HOME/android-sdk"
          fi
          # Android SDK sudah tersedia di ubuntu-22.04 runner
          sdkmanager --version || echo "sdkmanager not in PATH, searching..."
          # Cari sdkmanager jika tidak di PATH
          SDKMAN=$(find /usr/local/lib/android/sdk /home/runner /opt -name sdkmanager 2>/dev/null | head -1)
          if [ -n "$SDKMAN" ]; then
            export PATH="$(dirname $SDKMAN):$PATH"
            echo "$(dirname $SDKMAN)" >> $GITHUB_PATH
            echo "ANDROID_HOME=$(dirname $(dirname $(dirname $SDKMAN)))" >> $GITHUB_ENV
          fi

      - name: Accept Android licenses
        run: |
          yes | flutter doctor --android-licenses 2>/dev/null || true
          yes | sdkmanager --licenses 2>/dev/null || true

      - name: Install Android build tools
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" 2>/dev/null || true

      - name: Flutter doctor
        run: flutter doctor -v || true

      - name: Download Flutter project ZIP
        run: |
          echo "Downloading ZIP (retry 3x jika gagal)..."
          for i in 1 2 3; do
            curl -L --retry 3 --retry-delay 10 --max-time 600 \
              -o project.zip "${{ github.event.inputs.zip_download_url }}" && break
            echo "Attempt $i failed, retrying..."
            sleep 10
          done
          echo "Download selesai. Ukuran:"
          du -sh project.zip

      - name: Extract Flutter project
        run: |
          mkdir -p flutter_project
          unzip -o project.zip -d flutter_project_raw
          SUBDIR=$(find flutter_project_raw -maxdepth 1 -mindepth 1 -type d | head -1)
          if [ -n "$SUBDIR" ] && [ -f "$SUBDIR/pubspec.yaml" ]; then
            cp -r "$SUBDIR/." flutter_project/
          elif [ -f "flutter_project_raw/pubspec.yaml" ]; then
            cp -r flutter_project_raw/. flutter_project/
          else
            echo "ERROR: pubspec.yaml tidak ditemukan"
            find flutter_project_raw -name "pubspec.yaml" | head -5
            exit 1
          fi
          echo "=== pubspec.yaml ==="
          head -20 flutter_project/pubspec.yaml

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: pub-${{ hashFiles('flutter_project/pubspec.lock') }}
          restore-keys: pub-

      - name: Install Flutter dependencies
        working-directory: flutter_project
        run: flutter pub get

      - name: Build APK (${{ github.event.inputs.build_mode }})
        working-directory: flutter_project
        timeout-minutes: 40
        run: |
          if [ "${{ github.event.inputs.build_mode }}" = "release" ]; then
            flutter build apk --release --no-shrink
          else
            flutter build apk --debug
          fi

      - name: Locate and rename APK
        run: |
          APK=$(find flutter_project/build/app/outputs -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: APK tidak ditemukan"
            find flutter_project/build -type f | head -20
            exit 1
          fi
          mkdir -p artifacts
          cp "$APK" artifacts/flutter-${{ github.event.inputs.build_mode }}.apk
          echo "APK: $(du -sh artifacts/*.apk)"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk-${{ github.event.inputs.build_mode }}-${{ github.run_id }}
          path: artifacts/flutter-${{ github.event.inputs.build_mode }}.apk
          retention-days: 3