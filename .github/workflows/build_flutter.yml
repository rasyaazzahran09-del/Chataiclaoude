name: Flutter APK Builder

on:
  workflow_dispatch:
    inputs:
      zip_download_url:
        description: 'URL download file ZIP Flutter project'
        required: true
        type: string
      build_mode:
        description: 'Build mode (release atau debug)'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug
      run_id_ref:
        description: 'Referensi unik untuk tracking'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4.7.0
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2.14.0
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true
          cache-key: flutter-3.27.4-stable

      - name: Setup Android SDK
        run: |
          ANDROID_SDK="/usr/local/lib/android/sdk"
          echo "ANDROID_HOME=$ANDROID_SDK" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK" >> $GITHUB_ENV
          echo "$ANDROID_SDK/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK/platform-tools" >> $GITHUB_PATH

      - name: Accept Android licenses
        run: |
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" 2>/dev/null || true

      - name: Download Flutter project ZIP
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Downloading ZIP..."
          for i in 1 2 3; do
            curl -fL --retry 3 --retry-delay 10 --max-time 600 \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/octet-stream" \
              -o project.zip "${{ github.event.inputs.zip_download_url }}" && break
            echo "Attempt $i gagal, retry in 10s..."
            sleep 10
          done
          if [ ! -f project.zip ] || [ ! -s project.zip ]; then
            echo "ERROR: ZIP download gagal atau file kosong"
            exit 1
          fi
          du -sh project.zip

      - name: Extract Flutter project
        run: |
          mkdir -p flutter_project
          unzip -q project.zip -d flutter_project_tmp
          # Handle nested folder jika ada
          INNER=$(ls flutter_project_tmp)
          INNER_COUNT=$(ls flutter_project_tmp | wc -l)
          if [ "$INNER_COUNT" -eq 1 ] && [ -d "flutter_project_tmp/$INNER" ]; then
            mv "flutter_project_tmp/$INNER"/* flutter_project/ 2>/dev/null || true
            mv "flutter_project_tmp/$INNER"/.[!.]* flutter_project/ 2>/dev/null || true
          else
            mv flutter_project_tmp/* flutter_project/ 2>/dev/null || true
          fi
          rm -rf flutter_project_tmp project.zip
          ls flutter_project/

      - name: Disable minify and shrink resources
        run: |
          GRADLE="flutter_project/android/app/build.gradle"
          if [ -f "$GRADLE" ]; then
            sed -i 's/minifyEnabled true/minifyEnabled false/g' "$GRADLE"
            sed -i 's/shrinkResources true/shrinkResources false/g' "$GRADLE"
            echo "=== build.gradle after minify patch ==="
            cat "$GRADLE"
          fi

      - name: Fix signing config for release
        run: |
          GRADLE="flutter_project/android/app/build.gradle"
          BUILD_MODE="${{ github.event.inputs.build_mode }}"

          KEYSTORE_DIR="$HOME/.android"
          mkdir -p "$KEYSTORE_DIR"
          if [ ! -f "$KEYSTORE_DIR/debug.keystore" ]; then
            keytool -genkeypair -v \
              -keystore "$KEYSTORE_DIR/debug.keystore" \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Android Debug,O=Android,C=US" 2>/dev/null
          fi

          RELEASE_JKS="flutter_project/android/app/release.jks"
          if [ ! -f "$RELEASE_JKS" ]; then
            keytool -genkeypair -v \
              -keystore "$RELEASE_JKS" \
              -alias release \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=FlutterBot,O=FlutterBot,C=ID" 2>/dev/null
            echo "Release keystore generated."
          fi

          if grep -q "signingConfigs" "$GRADLE" 2>/dev/null; then
            sed -i 's|storeFile file("[^"]*")|storeFile file("release.jks")|g' "$GRADLE"
            sed -i 's|storePassword "[^"]*"|storePassword "android"|g' "$GRADLE"
            sed -i 's|keyAlias "[^"]*"|keyAlias "release"|g' "$GRADLE"
            sed -i 's|keyPassword "[^"]*"|keyPassword "android"|g' "$GRADLE"
            echo "Signing config patched."
          else
            if [ "$BUILD_MODE" = "release" ]; then
              python3 - << 'PYEOF'
import re, sys
with open('flutter_project/android/app/build.gradle', 'r') as f:
    content = f.read()
if 'signingConfigs' in content:
    print("signingConfigs already exists, skip inject")
    sys.exit(0)
signing_block = """
    signingConfigs {
        release {
            storeFile file("release.jks")
            storePassword "android"
            keyAlias "release"
            keyPassword "android"
        }
    }
"""
release_signing = """
            signingConfig signingConfigs.release
"""
content = content.replace('    buildTypes {', signing_block + '    buildTypes {', 1)
def inject_signing(m):
    inner = m.group(0)
    if 'signingConfig' not in inner:
        inner = inner.rstrip('}').rstrip() + '\n' + release_signing + '        }\n'
    return inner
content = re.sub(r'release \{[^}]*\}', inject_signing, content, count=1)
with open('flutter_project/android/app/build.gradle', 'w') as f:
    f.write(content)
print("signingConfigs injected successfully")
PYEOF
            fi
          fi

      - name: Write proguard-rules.pro
        run: |
          PROGUARD="flutter_project/android/app/proguard-rules.pro"
          if [ ! -f "$PROGUARD" ]; then
            cat > "$PROGUARD" << 'EOF'
# Keep all Flutter & Dart classes
-keep class io.flutter.** { *; }
-keep class io.flutter.plugins.** { *; }
-keep class io.flutter.embedding.** { *; }
-dontwarn io.flutter.**
-keepattributes *Annotation*
-keepattributes SourceFile,LineNumberTable
-keep public class * extends java.lang.Exception
-keep class ** { *; }
-dontwarn **
EOF
          else
            echo "" >> "$PROGUARD"
            echo "-keep class ** { *; }" >> "$PROGUARD"
            echo "-dontwarn **" >> "$PROGUARD"
          fi

      - name: Patch gradle wrapper version
        run: |
          WRAPPER="flutter_project/android/gradle/wrapper/gradle-wrapper.properties"
          if [ -f "$WRAPPER" ]; then
            sed -i 's|distributionUrl=.*|distributionUrl=https\://services.gradle.org/distributions/gradle-8.10.2-bin.zip|' "$WRAPPER"
            echo "Patched to Gradle 8.10.2"
            cat "$WRAPPER"
          fi

      - name: Write local.properties
        run: |
          FLUTTER_SDK=$(which flutter | sed 's|/bin/flutter||')
          echo "sdk.dir=$ANDROID_HOME" > flutter_project/android/local.properties
          echo "flutter.sdk=$FLUTTER_SDK" >> flutter_project/android/local.properties
          echo "flutter.buildMode=${{ github.event.inputs.build_mode }}" >> flutter_project/android/local.properties
          cat flutter_project/android/local.properties

      - name: Write gradle.properties
        run: |
          GP="flutter_project/android/gradle.properties"
          touch "$GP"
          grep -q "org.gradle.jvmargs"      "$GP" || echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m" >> "$GP"
          grep -q "android.useAndroidX"     "$GP" || echo "android.useAndroidX=true"    >> "$GP"
          grep -q "android.enableJetifier"  "$GP" || echo "android.enableJetifier=true" >> "$GP"
          grep -q "org.gradle.parallel"     "$GP" || echo "org.gradle.parallel=true"    >> "$GP"
          grep -q "org.gradle.caching"      "$GP" || echo "org.gradle.caching=true"     >> "$GP"
          grep -q "android.enableR8.fullMode" "$GP" || echo "android.enableR8.fullMode=false" >> "$GP"
          cat "$GP"

      - name: Cache Pub dependencies
        uses: actions/cache@v4.2.0
        with:
          path: ~/.pub-cache
          key: pub-${{ hashFiles('flutter_project/pubspec.lock') }}
          restore-keys: pub-

      - name: Flutter pub get
        working-directory: flutter_project
        run: flutter pub get

      - name: Flutter analyze (non-fatal)
        working-directory: flutter_project
        run: flutter analyze --no-fatal-infos --no-fatal-warnings 2>&1 || true

      - name: Build APK (${{ github.event.inputs.build_mode }})
        working-directory: flutter_project
        timeout-minutes: 40
        run: |
          set -o pipefail
          BUILD_MODE="${{ github.event.inputs.build_mode }}"
          echo "=== BUILD START: $BUILD_MODE ==="
          if [ "$BUILD_MODE" = "release" ]; then
            flutter build apk --release --no-tree-shake-icons --verbose 2>&1 | tee /tmp/flutter_build.log
          else
            flutter build apk --debug --no-tree-shake-icons --verbose 2>&1 | tee /tmp/flutter_build.log
          fi
          BUILD_EXIT=$?
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "════ BUILD GAGAL — error log:"
            grep -E "(Error|error|Exception|FAILED|lib/)" /tmp/flutter_build.log | tail -50 || true
            echo "════ 50 baris terakhir:"
            tail -50 /tmp/flutter_build.log
            exit 1
          fi

      - name: Locate and rename APK
        run: |
          APK=$(find flutter_project/build/app/outputs -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: APK tidak ditemukan"
            find flutter_project/build -type f 2>/dev/null | head -20
            exit 1
          fi
          mkdir -p artifacts
          cp "$APK" artifacts/flutter-${{ github.event.inputs.build_mode }}.apk
          echo "APK siap: $(du -sh artifacts/*.apk)"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: flutter-apk-${{ github.event.inputs.build_mode }}-${{ github.run_id }}
          path: artifacts/flutter-${{ github.event.inputs.build_mode }}.apk
          retention-days: 3