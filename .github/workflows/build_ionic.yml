name: Build Ionic/Capacitor/Cordova APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: "URL download ZIP project Ionic/Capacitor/Cordova"
        required: true
      tag:
        description: "Tag build"
        required: true
      build_type:
        description: "debug / release"
        required: true
        default: "release"
      framework:
        description: "Framework: capacitor / cordova / ionic"
        required: false
        default: "capacitor"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Xmx4g"

    steps:
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Download & Extract ZIP
        run: |
          ZIP_URL="${{ github.event.inputs.zip_url }}"
          if echo "$ZIP_URL" | grep -q "api.github.com/repos"; then
            curl -L -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
              -H "Accept: application/vnd.github.raw" \
              "$ZIP_URL" -o project.zip -w "\nHTTP: %{http_code}\n"
          else
            curl -L -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
              -H "Accept: application/octet-stream" \
              "$ZIP_URL" -o project.zip -w "\nHTTP: %{http_code}\n"
          fi
          ls -lh project.zip
          unzip -q project.zip -d project_raw
          SUB=$(find project_raw -maxdepth 1 -mindepth 1 -type d | wc -l)
          FILES=$(find project_raw -maxdepth 1 -mindepth 1 -type f | wc -l)
          if [ "$SUB" -eq 1 ] && [ "$FILES" -eq 0 ]; then
            PROJECT_DIR=$(find project_raw -maxdepth 1 -mindepth 1 -type d | head -n 1)
          else
            PROJECT_DIR="project_raw"
          fi
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.PROJECT_DIR }}/node_modules
            ~/.npm
          key: npm-ionic-${{ runner.os }}-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}
          restore-keys: npm-ionic-${{ runner.os }}-

      - name: Install dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: npm ci || npm install

      - name: Build Web Assets
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          FRAMEWORK="${{ github.event.inputs.framework }}"
          if npm run build --if-present; then
            echo "✅ Web build berhasil"
          else
            echo "⚠️ npm run build gagal, lanjut..."
          fi

      - name: Setup Android Platform
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          FRAMEWORK="${{ github.event.inputs.framework }}"
          if [ "$FRAMEWORK" = "cordova" ]; then
            npm install -g cordova
            cordova platform add android --save 2>/dev/null || true
          else
            npm install -g @ionic/cli @capacitor/cli 2>/dev/null || true
            npx cap add android 2>/dev/null || true
            npx cap sync android 2>/dev/null || true
          fi

      - name: Build APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          FRAMEWORK="${{ github.event.inputs.framework }}"
          BUILD_TYPE="${{ github.event.inputs.build_type }}"

          if [ "$FRAMEWORK" = "cordova" ]; then
            if [ "$BUILD_TYPE" = "debug" ]; then
              cordova build android --debug
            else
              cordova build android --release
            fi
          else
            # Capacitor / Ionic — build via gradlew
            if [ -d "android" ]; then
              cd android
              chmod +x gradlew
              if [ "$BUILD_TYPE" = "debug" ]; then
                ./gradlew assembleDebug --no-daemon --parallel --build-cache
              else
                ./gradlew assembleRelease --no-daemon --parallel --build-cache
              fi
            fi
          fi

      - name: Find & Upload APK
        run: |
          APK_FOUND=$(find $GITHUB_WORKSPACE -name "*.apk" | grep -v "test" | head -n 1)
          if [ -z "$APK_FOUND" ]; then echo "❌ APK tidak ditemukan!"; exit 1; fi
          ls -lh "$APK_FOUND"
          APK_REL=$(echo "$APK_FOUND" | sed "s|$GITHUB_WORKSPACE/||")
          echo "APK_PATH=$APK_REL" >> $GITHUB_ENV
          echo "PROJECT_DIR=$GITHUB_WORKSPACE" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ionic-${{ github.event.inputs.build_type }}-${{ github.event.inputs.tag }}
          path: ${{ env.PROJECT_DIR }}/${{ env.APK_PATH }}
          retention-days: 1
          if-no-files-found: error
