name: Web2APK

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: 'URL Website'
        required: true
        type: string
      app_name:
        description: 'Nama Aplikasi'
        required: true
        type: string
      icon_url:
        description: 'Icon URL (PNG/JPG, opsional)'
        required: false
        default: ''
        type: string
      build_mode:
        description: 'debug / release'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug
      run_id_ref:
        description: 'Referensi unik untuk tracking'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: stable
          cache: true

      - name: Setup Android SDK
        run: |
          ANDROID_SDK="/usr/local/lib/android/sdk"
          echo "ANDROID_HOME=$ANDROID_SDK" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK" >> $GITHUB_ENV
          echo "$ANDROID_SDK/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK/platform-tools" >> $GITHUB_PATH

      - name: Accept Android licenses
        run: |
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" 2>/dev/null || true

      - name: Install Python dependencies
        run: pip install Pillow requests

      - name: Generate Flutter WebView project
        run: |
          APP_NAME="${{ github.event.inputs.app_name }}"
          PKG=$(echo "$APP_NAME" | tr '[:upper:]' '[:lower:]' | tr ' ' '_' | tr -cd '[:alnum:]_' | head -c 30)
          PKG="${PKG:-webviewapp}"
          flutter create --org com.webview.app --project-name "$PKG" webview_app
          cd webview_app && flutter pub add webview_flutter
          echo "PKG=$PKG" >> $GITHUB_ENV

      - name: Inject WebView main.dart
        env:
          WEB_URL: ${{ github.event.inputs.web_url }}
          APP_NAME: ${{ github.event.inputs.app_name }}
        run: |
          python3 - << 'PYEOF'
import os
web_url  = os.environ.get('WEB_URL',  'https://example.com')
app_name = os.environ.get('APP_NAME', 'MyWebApp') or 'MyWebApp'
dart_code = """import 'package:flutter/material.dart';
import 'package:flutter/services.dart';
import 'package:webview_flutter/webview_flutter.dart';

void main() {
  WidgetsFlutterBinding.ensureInitialized();
  SystemChrome.setSystemUIOverlayStyle(const SystemUiOverlayStyle(
    statusBarColor: Colors.transparent,
  ));
  runApp(const MyApp());
}

class MyApp extends StatelessWidget {
  const MyApp({super.key});
  @override
  Widget build(BuildContext context) => MaterialApp(
    title: '""" + app_name + """',
    debugShowCheckedModeBanner: false,
    theme: ThemeData(primarySwatch: Colors.blue),
    home: const WebViewPage(),
  );
}

class WebViewPage extends StatefulWidget {
  const WebViewPage({super.key});
  @override State<WebViewPage> createState() => _WebViewPageState();
}

class _WebViewPageState extends State<WebViewPage> {
  late final WebViewController _c;
  bool _loading = true;
  @override void initState() {
    super.initState();
    _c = WebViewController()
      ..setJavaScriptMode(JavaScriptMode.unrestricted)
      ..setNavigationDelegate(NavigationDelegate(
        onPageFinished: (_) => setState(() => _loading = false),
      ))
      ..loadRequest(Uri.parse('""" + web_url + """'));
  }
  @override Widget build(BuildContext context) => Scaffold(
    body: SafeArea(child: Stack(children: [
      WebViewWidget(controller: _c),
      if (_loading) const Center(child: CircularProgressIndicator()),
    ])),
  );
}
"""
with open('webview_app/lib/main.dart', 'w') as f:
    f.write(dart_code)
print("main.dart OK:", app_name, "->", web_url)
PYEOF

      - name: Set app name & manifest
        env:
          APP_NAME: ${{ github.event.inputs.app_name }}
        run: |
          APP="${APP_NAME:-MyWebApp}"
          MANIFEST="webview_app/android/app/src/main/AndroidManifest.xml"
          sed -i "s/android:label=\"[^\"]*\"/android:label=\"$APP\"/" "$MANIFEST"
          grep -q "INTERNET" "$MANIFEST" || \
            sed -i 's/<application/<uses-permission android:name="android.permission.INTERNET" \/>\'$'\n    <application/' "$MANIFEST"

      - name: Patch Gradle wrapper version (WebView)
        run: |
          WRAPPER="webview_app/android/gradle/wrapper/gradle-wrapper.properties"
          if [ -f "$WRAPPER" ]; then
            sed -i 's|distributionUrl=.*|distributionUrl=https\://services.gradle.org/distributions/gradle-8.10.2-bin.zip|' "$WRAPPER"
            cat "$WRAPPER"
          fi

      - name: Write local.properties (WebView)
        run: |
          FLUTTER_SDK=$(which flutter | sed 's|/bin/flutter||')
          echo "sdk.dir=$ANDROID_HOME" > webview_app/android/local.properties
          echo "flutter.sdk=$FLUTTER_SDK" >> webview_app/android/local.properties

      - name: Write gradle.properties (WebView)
        run: |
          GP="webview_app/android/gradle.properties"
          touch "$GP"
          grep -q "org.gradle.jvmargs" "$GP" || echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m" >> "$GP"
          grep -q "android.useAndroidX" "$GP" || echo "android.useAndroidX=true" >> "$GP"
          grep -q "android.enableJetifier" "$GP" || echo "android.enableJetifier=true" >> "$GP"
          grep -q "android.enableR8.fullMode" "$GP" || echo "android.enableR8.fullMode=false" >> "$GP"

      - name: Generate release keystore (WebView)
        run: |
          RELEASE_JKS="webview_app/android/app/release.jks"
          keytool -genkeypair -v \
            -keystore "$RELEASE_JKS" \
            -alias release \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=FlutterBot,O=FlutterBot,C=ID" 2>/dev/null
          GRADLE="webview_app/android/app/build.gradle"
          if ! grep -q "signingConfigs" "$GRADLE" 2>/dev/null; then
            python3 - << 'PYEOF'
import re
with open('webview_app/android/app/build.gradle', 'r') as f:
    content = f.read()
if 'signingConfigs' not in content:
    signing_block = """
    signingConfigs {
        release {
            storeFile file("release.jks")
            storePassword "android"
            keyAlias "release"
            keyPassword "android"
        }
    }
"""
    content = content.replace('    buildTypes {', signing_block + '    buildTypes {', 1)
    content = re.sub(r'(release \{)', r'\1\n            signingConfig signingConfigs.release', content, count=1)
    with open('webview_app/android/app/build.gradle', 'w') as f:
        f.write(content)
    print("signingConfigs injected for WebView")
PYEOF
          fi

      - name: Download and set custom app icon
        env:
          ICON_URL: ${{ github.event.inputs.icon_url }}
        run: |
          [ -z "$ICON_URL" ] && echo "No icon, skip" && exit 0
          python3 - << 'PYEOF'
import os, sys, urllib.request, io
from PIL import Image
icon_url = os.environ.get('ICON_URL','')
if not icon_url: sys.exit(0)
sizes = {'mipmap-mdpi':48,'mipmap-hdpi':72,'mipmap-xhdpi':96,'mipmap-xxhdpi':144,'mipmap-xxxhdpi':192}
try:
    data = urllib.request.urlopen(icon_url, timeout=30).read()
    img = Image.open(io.BytesIO(data)).convert('RGBA')
    base = 'webview_app/android/app/src/main/res'
    for folder, size in sizes.items():
        d = os.path.join(base, folder)
        os.makedirs(d, exist_ok=True)
        img.resize((size, size), Image.LANCZOS).save(os.path.join(d, 'ic_launcher.png'), 'PNG')
        print(f"Icon {size}px -> {folder}")
except Exception as e:
    print(f"Warning icon: {e}")
PYEOF

      - name: Cache Pub dependencies (WebView)
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-wv-${{ hashFiles('webview_app/pubspec.lock') }}
          restore-keys: pub-wv-

      - name: Build APK (${{ github.event.inputs.build_mode }})
        working-directory: webview_app
        timeout-minutes: 40
        run: |
          set -o pipefail
          BUILD_MODE="${{ github.event.inputs.build_mode }}"
          if [ "$BUILD_MODE" = "release" ]; then
            flutter build apk --release --no-tree-shake-icons --verbose 2>&1 | tee /tmp/wv_build.log
          else
            flutter build apk --debug --no-tree-shake-icons --verbose 2>&1 | tee /tmp/wv_build.log
          fi
          BUILD_EXIT=$?
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "=== BUILD GAGAL ==="
            grep -E "(Error|error|Exception|FAILED)" /tmp/wv_build.log | tail -30 || true
            tail -30 /tmp/wv_build.log
            exit 1
          fi

      - name: Locate and rename APK
        env:
          APP_NAME: ${{ github.event.inputs.app_name }}
        run: |
          APK=$(find webview_app/build/app/outputs -name "*.apk" | head -1)
          [ -z "$APK" ] && echo "ERROR: APK tidak ditemukan" && exit 1
          mkdir -p artifacts
          SAFE=$(echo "${APP_NAME:-webview}" | tr ' ' '_' | tr -cd '[:alnum:]_-')
          cp "$APK" "artifacts/${SAFE}-${{ github.event.inputs.build_mode }}.apk"
          echo "APK: $(du -sh artifacts/*.apk)"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: webview-apk-${{ github.event.inputs.build_mode }}-${{ github.run_id }}
          path: artifacts/*.apk
          retention-days: 3
          if-no-files-found: error
