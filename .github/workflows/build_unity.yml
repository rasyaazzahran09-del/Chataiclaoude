name: Build Unity APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: "URL download ZIP project Unity"
        required: true
      tag:
        description: "Tag build"
        required: true
      build_type:
        description: "debug / release"
        required: true
        default: "release"
      unity_version:
        description: "Versi Unity (contoh: 2022.3.20f1, 2023.2.0f1)"
        required: false
        default: "2022.3.20f1"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "11"

      - name: Download & Extract ZIP
        run: |
          ZIP_URL="${{ github.event.inputs.zip_url }}"
          if echo "$ZIP_URL" | grep -q "api.github.com/repos"; then
            curl -L -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
              -H "Accept: application/vnd.github.raw" \
              "$ZIP_URL" -o project.zip -w "\nHTTP: %{http_code}\n"
          else
            curl -L -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
              -H "Accept: application/octet-stream" \
              "$ZIP_URL" -o project.zip -w "\nHTTP: %{http_code}\n"
          fi
          ls -lh project.zip
          unzip -q project.zip -d project_raw
          SUB=$(find project_raw -maxdepth 1 -mindepth 1 -type d | wc -l)
          FILES=$(find project_raw -maxdepth 1 -mindepth 1 -type f | wc -l)
          if [ "$SUB" -eq 1 ] && [ "$FILES" -eq 0 ]; then
            PROJECT_DIR=$(find project_raw -maxdepth 1 -mindepth 1 -type d | head -n 1)
          else
            PROJECT_DIR="project_raw"
          fi
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          echo "✅ Project: $PROJECT_DIR"

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: ${{ env.PROJECT_DIR }}/Library
          key: unity-lib-${{ runner.os }}-${{ github.event.inputs.unity_version }}
          restore-keys: unity-lib-${{ runner.os }}-

      - name: Build Unity Project via gradle (pre-exported)
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "=== Deteksi struktur project Unity ==="

          # Jika sudah ada folder android gradle (pre-exported Unity project)
          GRADLE_PATH=$(find . -name "gradlew" | head -n 1)
          if [ -n "$GRADLE_PATH" ]; then
            echo "✅ Gradle project ditemukan (Unity pre-exported): $GRADLE_PATH"
            GRADLE_DIR=$(dirname "$GRADLE_PATH")
            cd "$GRADLE_DIR"
            chmod +x gradlew

            if [ "${{ github.event.inputs.build_type }}" = "debug" ]; then
              ./gradlew assembleDebug --no-daemon --parallel
            else
              ./gradlew assembleRelease --no-daemon --parallel
            fi
          else
            echo "❌ Tidak ditemukan gradlew. Pastikan ZIP adalah Unity project yang sudah di-export ke Android."
            echo ""
            echo "Cara export di Unity:"
            echo "1. File → Build Settings → Android"
            echo "2. Centang 'Export Project'"
            echo "3. Klik 'Export' → ZIP hasilnya"
            exit 1
          fi

      - name: Find & Upload APK
        run: |
          APK_FOUND=$(find $GITHUB_WORKSPACE -name "*.apk" | head -n 1)
          if [ -z "$APK_FOUND" ]; then echo "❌ APK tidak ditemukan!"; exit 1; fi
          ls -lh "$APK_FOUND"
          APK_REL=$(echo "$APK_FOUND" | sed "s|$GITHUB_WORKSPACE/||")
          echo "APK_PATH=$APK_REL" >> $GITHUB_ENV
          echo "PROJECT_DIR=$GITHUB_WORKSPACE" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: unity-${{ github.event.inputs.build_type }}-${{ github.event.inputs.tag }}
          path: ${{ env.PROJECT_DIR }}/${{ env.APK_PATH }}
          retention-days: 1
          if-no-files-found: error
