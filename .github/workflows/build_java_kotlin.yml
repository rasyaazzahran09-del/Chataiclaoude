name: Build Java/Kotlin APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: "URL download ZIP project Java/Kotlin Android"
        required: true
      tag:
        description: "Tag build"
        required: true
      build_type:
        description: "debug / release"
        required: true
        default: "release"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.workers.max=4 -Dkotlin.incremental=false -Xmx4g"

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Download ZIP project
        run: |
          echo "=== Downloading ZIP ==="
          ZIP_URL="${{ github.event.inputs.zip_url }}"
          if echo "$ZIP_URL" | grep -q "api.github.com/repos"; then
            curl -L \
              -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
              -H "Accept: application/vnd.github.raw" \
              "$ZIP_URL" -o project.zip \
              -w "\n=== HTTP Status: %{http_code} ===\n"
          else
            curl -L \
              -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
              -H "Accept: application/octet-stream" \
              "$ZIP_URL" -o project.zip \
              -w "\n=== HTTP Status: %{http_code} ===\n"
          fi
          ls -lh project.zip
          file project.zip

      - name: Extract ZIP
        run: |
          if ! unzip -t project.zip > /dev/null 2>&1; then
            echo "❌ File bukan ZIP valid!"
            cat project.zip
            exit 1
          fi
          unzip -q project.zip -d project_raw
          SUB_DIR_COUNT=$(find project_raw -maxdepth 1 -mindepth 1 -type d | wc -l)
          FILE_COUNT=$(find project_raw -maxdepth 1 -mindepth 1 -type f | wc -l)
          if [ "$SUB_DIR_COUNT" -eq 1 ] && [ "$FILE_COUNT" -eq 0 ]; then
            PROJECT_DIR=$(find project_raw -maxdepth 1 -mindepth 1 -type d | head -n 1)
          else
            PROJECT_DIR="project_raw"
          fi
          echo "✅ Project root: $PROJECT_DIR"
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          find "$PROJECT_DIR" | head -30

      - name: Setup Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build APK (Java/Kotlin)
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          GRADLE_PATH=$(find . -name "gradlew" | head -n 1)
          if [ -z "$GRADLE_PATH" ]; then
            echo "❌ ERROR: gradlew tidak ditemukan!"
            exit 1
          fi
          GRADLE_DIR=$(dirname "$GRADLE_PATH")
          cd "$GRADLE_DIR"
          chmod +x gradlew

          if [ "${{ github.event.inputs.build_type }}" = "debug" ]; then
            echo "🔨 Building DEBUG APK..."
            ./gradlew assembleDebug --no-daemon --parallel --build-cache
          else
            echo "🔨 Building RELEASE APK..."
            ./gradlew assembleRelease --no-daemon --parallel --build-cache
          fi

      - name: Find & Upload APK
        run: |
          APK_FOUND=$(find $GITHUB_WORKSPACE -name "*.apk" | head -n 1)
          if [ -z "$APK_FOUND" ]; then
            echo "❌ APK tidak ditemukan!"
            exit 1
          fi
          echo "✅ APK: $APK_FOUND"
          ls -lh "$APK_FOUND"
          APK_REL=$(echo "$APK_FOUND" | sed "s|$GITHUB_WORKSPACE/||")
          echo "APK_PATH=$APK_REL" >> $GITHUB_ENV
          echo "PROJECT_DIR=$GITHUB_WORKSPACE" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-kotlin-${{ github.event.inputs.build_type }}-${{ github.event.inputs.tag }}
          path: ${{ env.PROJECT_DIR }}/${{ env.APK_PATH }}
          retention-days: 1
          if-no-files-found: error
