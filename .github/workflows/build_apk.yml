name: Build Flutter APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: "URL download ZIP project Flutter"
        required: true

      tag:
        description: "Tag build"
        required: true

      build_type:
        description: "debug / release"
        required: true
        default: "release"

      only_analyze:
        description: "Hanya jalankan analyze (true/false)"
        required: false
        default: "false"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.workers.max=4 -Xmx4g"
      PUB_CACHE: "/root/.pub-cache"

    steps:

      # =========================
      # NODE.JS
      # =========================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      # =========================
      # DOWNLOAD ZIP
      # =========================
      - name: Download ZIP project
        run: |
          echo "=== Downloading ZIP ==="
          echo "URL: ${{ github.event.inputs.zip_url }}"

          ZIP_URL="${{ github.event.inputs.zip_url }}"

          # Deteksi apakah URL adalah GitHub Contents API atau URL biasa
          if echo "$ZIP_URL" | grep -q "api.github.com/repos"; then
            echo "→ GitHub Contents API URL terdeteksi, pakai header Accept: raw"
            curl -L \
              -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
              -H "Accept: application/vnd.github.raw" \
              "$ZIP_URL" \
              -o project.zip \
              -w "\n=== HTTP Status: %{http_code} ===\n=== Final URL: %{url_effective} ===\n"
          else
            echo "→ URL biasa"
            curl -L \
              -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
              -H "Accept: application/octet-stream" \
              "$ZIP_URL" \
              -o project.zip \
              -w "\n=== HTTP Status: %{http_code} ===\n=== Final URL: %{url_effective} ===\n"
          fi

          echo ""
          echo "=== File Info ==="
          ls -lh project.zip

          echo ""
          echo "=== File Type ==="
          file project.zip

          echo ""
          echo "=== First Bytes ==="
          xxd project.zip | head -2

      # =========================
      # EXTRACT ZIP
      # =========================
      - name: Extract ZIP
        run: |
          echo "=== Validating ZIP ==="

          if ! unzip -t project.zip > /dev/null 2>&1; then
            echo "❌ File bukan ZIP valid!"
            echo ""
            echo "=== Isi file ==="
            cat project.zip
            exit 1
          fi

          echo "✅ ZIP valid"

          echo ""
          echo "=== Extracting ZIP ==="
          unzip -q project.zip -d project_raw

          echo ""
          echo "=== Isi folder project_raw ==="
          find project_raw | head -50

          echo ""
          echo "=== Mengunci Project Dir ==="

          SUB_DIR_COUNT=$(find project_raw -maxdepth 1 -mindepth 1 -type d | wc -l)
          FILE_COUNT=$(find project_raw -maxdepth 1 -mindepth 1 -type f | wc -l)

          if [ "$SUB_DIR_COUNT" -eq 1 ] && [ "$FILE_COUNT" -eq 0 ]; then
            PROJECT_DIR=$(find project_raw -maxdepth 1 -mindepth 1 -type d | head -n 1)
          else
            PROJECT_DIR="project_raw"
          fi

          echo "✅ Project root: $PROJECT_DIR"
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

      # =========================
      # FLUTTER PUB CACHE
      # =========================
      - name: Cache Flutter pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            /root/.pub-cache
          key: flutter-pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            flutter-pub-${{ runner.os }}-

      # =========================
      # GRADLE CACHE
      # =========================
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # =========================
      # JAVA
      # =========================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # =========================
      # FLUTTER
      # =========================
      - name: Setup Flutter
        uses: subosito/flutter-action@main
        with:
          flutter-version: "3.41.9"
          channel: "stable"
          cache: true

      # ==========================================================
      # 🔍 ANALYZE — STEP 1: Jalankan & cetak hasil
      # ==========================================================
      - name: Analyze Project Code
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "=== Starting Automated Code Analysis ==="

          if [ -f "pubspec.yaml" ]; then
            echo "🔍 Menjalankan linting via flutter analyze..."

            flutter analyze > analyze_report.txt 2>&1 || true

            echo "[RESULT_ANALYZE]"
            cat analyze_report.txt
            echo "[END_RESULT_ANALYZE]"

            rm -f analyze_report.txt

          else
            echo "☕ Project native / gradlew terdeteksi!"
            echo "[RESULT_ANALYZE]"
            echo "❌ Fitur analyze hanya support project Flutter (pubspec.yaml tidak ditemukan)."
            echo "[END_RESULT_ANALYZE]"
          fi

      # ==========================================================
      # 🔍 ANALYZE — STEP 2: Stop jika only_analyze
      # ==========================================================
      - name: Stop if Analyze Only
        if: ${{ github.event.inputs.only_analyze == 'true' }}
        run: |
          echo "Analyze-only mode aktif. Workflow dihentikan di sini."
          exit 1

      # =========================
      # FLUTTER DOCTOR
      # =========================
      - name: Flutter Doctor
        run: flutter doctor

      # =========================
      # PUB GET
      # =========================
      - name: Get dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "=== Running flutter pub get ==="
          if [ -f "pubspec.yaml" ]; then
            timeout 180s flutter pub get || echo "⚠️ Gagal download package, coba lanjut..."
          else
            echo "☕ Bukan project Flutter standar, skip pub get!"
          fi

      # =========================
      # BUILD APK
      # =========================
      - name: Build APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "=== Building APK ==="
          echo "Mode: ${{ github.event.inputs.build_type }}"

          if [ -f "pubspec.yaml" ]; then
            echo "🔥 Project Flutter Terdeteksi!"
            flutter build apk --${{ github.event.inputs.build_type }}

          else
            echo "☕ Project Native Android Terdeteksi!"
            GRADLE_PATH=$(find . -name "gradlew" | head -n 1)

            if [ -z "$GRADLE_PATH" ]; then
              echo "❌ ERROR: File 'gradlew' tidak ditemukan!"
              exit 1
            fi

            GRADLE_DIR=$(dirname "$GRADLE_PATH")
            cd "$GRADLE_DIR"
            chmod +x gradlew

            if [ "${{ github.event.inputs.build_type }}" = "debug" ]; then
              ./gradlew assembleDebug
            else
              ./gradlew assembleRelease
            fi
            cd -
          fi

      # =========================
      # CHECK APK
      # =========================
      - name: Check APK Output
        run: |
          echo "=== APK Output Scanning ==="
          find $GITHUB_WORKSPACE -name "*.apk"

          APK_FOUND=$(find $GITHUB_WORKSPACE -name "*.apk" | head -n 1)

          if [ -z "$APK_FOUND" ]; then
            echo "Error: APK tidak ditemukan!"
            exit 1
          fi

          APK_PATH=$(echo "$APK_FOUND" | sed "s|$GITHUB_WORKSPACE/||")
          echo "✅ APK ditemukan: $APK_PATH"

          echo "PROJECT_DIR=$GITHUB_WORKSPACE" >> $GITHUB_ENV
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV

          echo ""
          echo "=== APK Size ==="
          ls -lh "$APK_FOUND"

      # =========================
      # UPLOAD APK
      # =========================
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-${{ github.event.inputs.build_type }}-${{ github.event.inputs.tag }}
          path: ${{ env.PROJECT_DIR }}/${{ env.APK_PATH }}
          retention-days: 1
          if-no-files-found: error
