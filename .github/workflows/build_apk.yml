name: Build APK Universal

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: "URL download ZIP project"
        required: true
      tag:
        description: "Tag build (ID unik)"
        required: true
      build_type:
        description: "debug / release"
        required: true
        default: "release"
      project_type:
        description: "flutter / native_java / native_kotlin / godot / react_native / ionic / xamarin / unity / auto"
        required: true
        default: "auto"
      only_analyze:
        description: "Hanya jalankan analyze (true/false)"
        required: false
        default: "false"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.workers.max=4 -Xmx4g"
      JAVA_OPTS: "-Xmx4g"

    steps:

      # =========================
      # NODE.JS
      # =========================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      # =========================
      # DOWNLOAD ZIP (support s/d 2GB)
      # =========================
      - name: Download ZIP project
        run: |
          echo "=== Downloading ZIP ==="
          echo "URL: ${{ github.event.inputs.zip_url }}"

          ZIP_URL="${{ github.event.inputs.zip_url }}"

          if echo "$ZIP_URL" | grep -q "api.github.com/repos"; then
            curl -L \
              -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
              -H "Accept: application/vnd.github.raw" \
              --max-filesize 2147483648 \
              --retry 3 --retry-delay 5 \
              --connect-timeout 60 --max-time 900 \
              "$ZIP_URL" -o project.zip \
              -w "\n=== HTTP: %{http_code} | Size: %{size_download} bytes ===\n"
          else
            curl -L \
              -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
              -H "Accept: application/octet-stream" \
              --max-filesize 2147483648 \
              --retry 3 --retry-delay 5 \
              --connect-timeout 60 --max-time 900 \
              "$ZIP_URL" -o project.zip \
              -w "\n=== HTTP: %{http_code} | Size: %{size_download} bytes ===\n"
          fi

          ls -lh project.zip
          file project.zip
          xxd project.zip | head -2

      # =========================
      # EXTRACT ZIP
      # =========================
      - name: Extract ZIP
        run: |
          echo "=== Validating ZIP ==="
          if ! unzip -t project.zip > /dev/null 2>&1; then
            echo "❌ File bukan ZIP valid!"
            cat project.zip | head -20
            exit 1
          fi
          echo "✅ ZIP valid"

          echo "=== Extracting ZIP ==="
          unzip -q project.zip -d project_raw

          echo "=== Isi folder project_raw ==="
          find project_raw | head -60

          SUB_DIR_COUNT=$(find project_raw -maxdepth 1 -mindepth 1 -type d | wc -l)
          FILE_COUNT=$(find project_raw -maxdepth 1 -mindepth 1 -type f | wc -l)

          if [ "$SUB_DIR_COUNT" -eq 1 ] && [ "$FILE_COUNT" -eq 0 ]; then
            PROJECT_DIR=$(find project_raw -maxdepth 1 -mindepth 1 -type d | head -n 1)
          else
            PROJECT_DIR="project_raw"
          fi

          echo "✅ Project root: $PROJECT_DIR"
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

      # =========================
      # DETECT PROJECT TYPE
      # =========================
      - name: Detect Project Type
        run: |
          PROJECT_TYPE="${{ github.event.inputs.project_type }}"
          DIR="${{ env.PROJECT_DIR }}"

          if [ "$PROJECT_TYPE" = "auto" ]; then
            if [ -f "$DIR/pubspec.yaml" ]; then
              PROJECT_TYPE="flutter"
            elif find "$DIR" -name "*.sln" | grep -q .; then
              PROJECT_TYPE="xamarin"
            elif find "$DIR" -name "project.godot" | grep -q .; then
              PROJECT_TYPE="godot"
            elif [ -f "$DIR/package.json" ] && grep -q "react-native" "$DIR/package.json" 2>/dev/null; then
              PROJECT_TYPE="react_native"
            elif [ -f "$DIR/package.json" ] && (grep -q "ionic" "$DIR/package.json" 2>/dev/null || grep -q "@ionic" "$DIR/package.json" 2>/dev/null); then
              PROJECT_TYPE="ionic"
            elif find "$DIR" -name "*.kt" | grep -q .; then
              PROJECT_TYPE="native_kotlin"
            elif find "$DIR" -name "gradlew" | grep -q .; then
              PROJECT_TYPE="native_java"
            else
              PROJECT_TYPE="flutter"
            fi
            echo "🔍 Auto-detected: $PROJECT_TYPE"
          fi

          echo "PROJECT_TYPE=$PROJECT_TYPE" >> $GITHUB_ENV
          echo "✅ Project type: $PROJECT_TYPE"

      # =========================
      # JAVA
      # =========================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # =========================
      # ANDROID SDK (untuk semua native)
      # =========================
      - name: Setup Android SDK
        if: env.PROJECT_TYPE == 'native_java' || env.PROJECT_TYPE == 'native_kotlin' || env.PROJECT_TYPE == 'godot'
        uses: android-actions/setup-android@v3

      # =========================
      # FLUTTER
      # =========================
      - name: Setup Flutter
        if: env.PROJECT_TYPE == 'flutter' || env.PROJECT_TYPE == 'ionic'
        uses: subosito/flutter-action@main
        with:
          flutter-version: "3.32.2"
          channel: "stable"
          cache: true

      # =========================
      # NODE + REACT NATIVE
      # =========================
      - name: Setup React Native deps
        if: env.PROJECT_TYPE == 'react_native'
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          npm install --legacy-peer-deps
          npm install -g react-native@latest @react-native-community/cli

      # =========================
      # IONIC
      # =========================
      - name: Setup Ionic deps
        if: env.PROJECT_TYPE == 'ionic'
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          npm install --legacy-peer-deps
          npm install -g @ionic/cli @capacitor/cli
          flutter pub get || true

      # =========================
      # GODOT
      # =========================
      - name: Setup Godot
        if: env.PROJECT_TYPE == 'godot'
        run: |
          GODOT_VERSION="4.3"
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip" -O godot.zip
          unzip -q godot.zip
          chmod +x Godot_v${GODOT_VERSION}-stable_linux.x86_64
          mv Godot_v${GODOT_VERSION}-stable_linux.x86_64 /usr/local/bin/godot

          # Export templates
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz" -O templates.tpz
          unzip -q templates.tpz -d /tmp/godot_templates
          cp /tmp/godot_templates/templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/

      # =========================
      # UNITY (jika ada license)
      # =========================
      - name: Setup Unity
        if: env.PROJECT_TYPE == 'unity'
        run: |
          echo "⚠️ Unity build memerlukan Unity license aktif di secret UNITY_LICENSE"
          echo "Pastikan UNITY_LICENSE sudah di-set di GitHub Secrets."
          # Unity CLI install (harus ada lisensi)
          wget -q https://public-cdn.cloud.unity3d.com/hub/prod/UnityHub.AppImage -O UnityHub.AppImage
          chmod +x UnityHub.AppImage

      # =========================
      # ANALYZE (Flutter / semua)
      # =========================
      - name: Analyze Project Code
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "=== Code Analysis ==="
          if [ "${{ env.PROJECT_TYPE }}" = "flutter" ] && [ -f "pubspec.yaml" ]; then
            flutter analyze > analyze_report.txt 2>&1 || true
            echo "[RESULT_ANALYZE]"
            cat analyze_report.txt
            echo "[END_RESULT_ANALYZE]"
            rm -f analyze_report.txt
          else
            echo "[RESULT_ANALYZE]"
            echo "✅ Analyze hanya tersedia untuk Flutter. Project type: ${{ env.PROJECT_TYPE }}"
            echo "[END_RESULT_ANALYZE]"
          fi

      - name: Stop if Analyze Only
        if: ${{ github.event.inputs.only_analyze == 'true' }}
        run: |
          echo "Analyze-only mode aktif. Workflow selesai."
          exit 1

      # =========================
      # BUILD — FLUTTER
      # =========================
      - name: Build Flutter APK
        if: env.PROJECT_TYPE == 'flutter'
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "=== Flutter: flutter pub get ==="
          flutter pub get

          echo "=== Flutter: Building APK (${{ github.event.inputs.build_type }}) ==="
          if [ "${{ github.event.inputs.build_type }}" = "debug" ]; then
            flutter build apk --debug --no-tree-shake-icons
          else
            flutter build apk --release --no-tree-shake-icons
          fi

      # =========================
      # BUILD — NATIVE JAVA / KOTLIN
      # =========================
      - name: Build Native Android APK
        if: env.PROJECT_TYPE == 'native_java' || env.PROJECT_TYPE == 'native_kotlin'
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          GRADLE_PATH=$(find . -name "gradlew" | head -n 1)
          if [ -z "$GRADLE_PATH" ]; then
            echo "❌ gradlew tidak ditemukan!"
            exit 1
          fi
          GRADLE_DIR=$(dirname "$GRADLE_PATH")
          cd "$GRADLE_DIR"
          chmod +x gradlew

          echo "=== Gradle build (${{ github.event.inputs.build_type }}) ==="
          if [ "${{ github.event.inputs.build_type }}" = "debug" ]; then
            ./gradlew assembleDebug --no-daemon --parallel --max-workers=4
          else
            ./gradlew assembleRelease --no-daemon --parallel --max-workers=4
          fi

      # =========================
      # BUILD — REACT NATIVE
      # =========================
      - name: Build React Native APK
        if: env.PROJECT_TYPE == 'react_native'
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          ANDROID_DIR="android"
          [ -d "android" ] || ANDROID_DIR=$(find . -name "gradlew" -exec dirname {} \; | head -1)

          cd "$ANDROID_DIR"
          chmod +x gradlew

          if [ "${{ github.event.inputs.build_type }}" = "debug" ]; then
            ./gradlew assembleDebug --no-daemon --parallel --max-workers=4
          else
            ./gradlew assembleRelease --no-daemon --parallel --max-workers=4
          fi

      # =========================
      # BUILD — IONIC / CAPACITOR
      # =========================
      - name: Build Ionic APK
        if: env.PROJECT_TYPE == 'ionic'
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          ionic build --prod || npm run build -- --prod || true
          npx cap sync android || true

          cd android
          chmod +x gradlew
          if [ "${{ github.event.inputs.build_type }}" = "debug" ]; then
            ./gradlew assembleDebug --no-daemon
          else
            ./gradlew assembleRelease --no-daemon
          fi

      # =========================
      # BUILD — GODOT
      # =========================
      - name: Build Godot APK
        if: env.PROJECT_TYPE == 'godot'
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          mkdir -p build/android
          if [ "${{ github.event.inputs.build_type }}" = "debug" ]; then
            godot --headless --export-debug "Android" build/android/output.apk || \
            godot --headless --export "Android Debug" build/android/output.apk
          else
            godot --headless --export-release "Android" build/android/output.apk || \
            godot --headless --export "Android" build/android/output.apk
          fi

      # =========================
      # CHECK APK OUTPUT
      # =========================
      - name: Check APK Output
        run: |
          echo "=== Scanning APK Output ==="
          find $GITHUB_WORKSPACE -name "*.apk" 2>/dev/null

          APK_FOUND=$(find $GITHUB_WORKSPACE -name "*.apk" | head -n 1)

          if [ -z "$APK_FOUND" ]; then
            echo "❌ APK tidak ditemukan!"
            exit 1
          fi

          APK_SIZE=$(stat -c%s "$APK_FOUND")
          echo "✅ APK: $APK_FOUND"
          echo "📦 Size: $(( APK_SIZE / 1024 / 1024 )) MB"

          APK_PATH=$(echo "$APK_FOUND" | sed "s|$GITHUB_WORKSPACE/||")
          echo "PROJECT_DIR=$GITHUB_WORKSPACE" >> $GITHUB_ENV
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV

      # =========================
      # COMPRESS APK KE ZIP (untuk kirim balik, support 2GB)
      # =========================
      - name: Compress APK to ZIP
        run: |
          APK_FULL="${GITHUB_WORKSPACE}/${APK_PATH}"
          APK_BASENAME=$(basename "$APK_FULL")
          ZIP_NAME="apk-${{ github.event.inputs.tag }}-${{ github.event.inputs.build_type }}-${{ env.PROJECT_TYPE }}.zip"

          zip -j "$GITHUB_WORKSPACE/$ZIP_NAME" "$APK_FULL"
          echo "APK_ZIP=$ZIP_NAME" >> $GITHUB_ENV
          ls -lh "$GITHUB_WORKSPACE/$ZIP_NAME"

      # =========================
      # UPLOAD ARTIFACT (support file besar)
      # =========================
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ github.event.inputs.tag }}-${{ github.event.inputs.build_type }}-${{ env.PROJECT_TYPE }}
          path: |
            ${{ env.PROJECT_DIR }}/${{ env.APK_PATH }}
          retention-days: 3
          if-no-files-found: error
          compression-level: 6

